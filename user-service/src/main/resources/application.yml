server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USERNAME:connectsphere}
    password: ${DB_PASSWORD:connectsphere}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    issuer: ${SECURITY_JWT_ISSUER:connectsphere-user-service}
    expiration: PT4H
    secret: ${SECURITY_JWT_SECRET:connectsphere-demo-secret-key-2026-change-me}
