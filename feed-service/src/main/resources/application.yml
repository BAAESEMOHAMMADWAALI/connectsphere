server:
  port: 8084

spring:
  application:
    name: feed-service
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

services:
  post-service-base-url: http://localhost:8082
  follow-service-base-url: http://localhost:8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

